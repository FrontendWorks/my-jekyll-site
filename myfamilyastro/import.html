<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Profile - My Family Astro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .container {
      max-width: 480px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .logo-placeholder {
      font-size: 48px;
      margin-bottom: 24px;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 16px;
      border-radius: 14px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      margin-bottom: 24px;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 24px 0;
      position: relative;
    }

    .divider::before {
      content: "OR";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #151e33;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
    }

    .store-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .store-btn svg {
      margin-right: 8px;
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-placeholder">🌌</div>
    <h1 id="status-title">Opening My Family Astro...</h1>
    <p id="status-desc">We are redirecting you to import the family member's birth details. If the app doesn't open automatically, click the button below.</p>
    
    <a href="#" id="app-launch-btn" class="btn">Open My Family Astro</a>
    
    <div class="divider"></div>
    
    <p style="margin-bottom: 12px; font-size: 13px;">Don't have the app installed yet?</p>
    <div class="store-buttons">
      <!-- App Store Button -->
      <a href="https://apps.apple.com/app/myfamilyastro/dummyid1234567890" class="store-btn">
        <svg viewBox="0 0 24 24"><path d="M18.71,19.5C17.88,20.74 17,21.95 15.66,22C14.32,22.05 13.89,21.24 12.37,21.24C10.84,21.24 10.37,22 9.09,22.05C7.81,22.1 6.8,20.77 5.96,19.5C4.25,17 2.94,12.45 4.7,9.39C5.57,7.87 7.13,6.91 8.82,6.88C10.1,6.86 11.32,7.75 12.11,7.75C12.89,7.75 14.37,6.68 15.92,6.84C16.57,6.87 18.39,7.1 19.56,8.82C19.47,8.88 17.39,10.1 17.41,12.63C17.44,15.65 20.06,16.66 20.1,16.67C20.08,16.74 19.67,18.11 18.71,19.5M15.97,4.17C16.63,3.37 17.07,2.28 16.95,1C16,1.04 14.9,1.6 14.24,2.38C13.68,3.04 13.19,4.14 13.34,5.39C14.39,5.47 15.4,4.88 15.97,4.17Z"/></svg>
        Download for iOS
      </a>
      <!-- Play Store Button -->
      <a href="https://play.google.com/store/apps/details?id=com.codonomics.myfamilyastro" class="store-btn">
        <svg viewBox="0 0 24 24"><path d="M3,5.27V18.73L16.55,12L3,5.27M17.87,11.33L19.85,12.3L17.87,13.27L16.82,12.12L17.87,11.33M3,3.15L16.03,11.34L15,12.4L3,3.15M3,20.85L15,11.6L16.03,12.66L3,20.85Z"/></svg>
        Download for Android
      </a>
    </div>
  </div>

  <script>
    // 1. Parse 'importData' query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const importData = urlParams.get('importData');

    if (importData) {
      const appSchemeUrl = `myfamilyastro://home?importData=${importData}`;
      
      // Update fallback button href
      document.getElementById('app-launch-btn').setAttribute('href', appSchemeUrl);

      // 2. Perform Automatic Redirect after a minor aesthetic delay
      setTimeout(() => {
        window.location.href = appSchemeUrl;
      }, 800);
    } else {
      // Handle page loaded with no data parameter
      document.getElementById('status-title').innerText = "Import Data Missing";
      document.getElementById('status-desc').innerText = "Please use a valid sharing link generated from the My Family Astro app.";
      document.getElementById('app-launch-btn').style.display = "none";
    }
  </script>
</body>
</html>
